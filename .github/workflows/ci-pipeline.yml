name: Java Bot CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: BOT_TOKEN
    # Поднимаем временный PostgreSQL для теста
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: tgBot
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: hackergs228
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 # Рекомендую 17, но можно и 11
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile

      - name: Run Bot in background
        env:
          # Эти переменные должны быть в Settings -> Secrets вашего репозитория
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_NAME: ${{ secrets.BOT_NAME }}
        run: |
          mvn exec:java -Dexec.mainClass="com.bot.clients.Main" & 
          echo $! > bot.pid
          sleep 5 # Даем время на подключение к БД

      - name: Send Test Message to Telegram
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TEST_CHAT_ID }} \
          -d text="🚀 CI Pipeline: Проект собран, база подключена, бот в сети!"

      - name: Wait for 10 seconds
        run: sleep 10
        
      - name: Stop processes
        run: |
          kill $(cat bot.pid) || true
          echo "Бот остановлен или уже был закрыт."
